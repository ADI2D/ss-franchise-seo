<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franchise SEO & Conversion Framework - Special Strong</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
    <style>
        body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 45px;
            background: #0d1117;
        }
        .markdown-body {
            background: #0d1117;
            color: #c9d1d9;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            border-bottom-color: #30363d;
            color: #c9d1d9;
        }
        .markdown-body a { color: #58a6ff; }
        .markdown-body code { background: #161b22; color: #c9d1d9; }
        .markdown-body pre { background: #161b22; }
        .markdown-body table tr { background: #0d1117; border-color: #30363d; }
        .markdown-body table tr:nth-child(2n) { background: #161b22; }
        .markdown-body table th, .markdown-body table td { border-color: #30363d; }
        .markdown-body blockquote { border-left-color: #30363d; color: #8b949e; }
        .markdown-body hr { background-color: #30363d; }
        .loading { text-align: center; padding: 50px; color: #8b949e; }
        @media (max-width: 767px) { body { padding: 15px; } }
        @media (prefers-color-scheme: light) {
            body { background: #fff; }
            .markdown-body { background: #fff; color: #24292f; }
            .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: #24292f; border-bottom-color: #d0d7de; }
            .markdown-body a { color: #0969da; }
            .markdown-body code { background: #f6f8fa; color: #24292f; }
            .markdown-body pre { background: #f6f8fa; }
            .markdown-body table tr { background: #fff; border-color: #d0d7de; }
            .markdown-body table tr:nth-child(2n) { background: #f6f8fa; }
            .markdown-body table th, .markdown-body table td { border-color: #d0d7de; }
            .markdown-body blockquote { border-left-color: #d0d7de; color: #57606a; }
            .markdown-body hr { background-color: #d0d7de; }
            .loading { color: #57606a; }
        }
    </style>
</head>
<body>
    <article class="markdown-body" id="content">
        <div class="loading">Loading framework...</div>
    </article>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        fetch('https://raw.githubusercontent.com/ADI2D/ss-franchise-seo/master/franchise-seo-conversion-framework.md')
            .then(response => response.text())
            .then(markdown => {
                document.getElementById('content').innerHTML = marked.parse(markdown);
            })
            .catch(error => {
                document.getElementById('content').innerHTML = '<p>Error loading content. <a href="https://github.com/ADI2D/ss-franchise-seo/blob/master/franchise-seo-conversion-framework.md">View on GitHub</a></p>';
            });
    </script>
</body>
</html>
